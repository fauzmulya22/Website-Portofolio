<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" role="img" aria-labelledby="title">
  <title id="title">Instagram</title>
  <defs>
    <linearGradient id="igGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fccc63"/>
      <stop offset="30%" stop-color="#f77737"/>
      <stop offset="60%" stop-color="#e1306c"/>
      <stop offset="100%" stop-color="#833ab4"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="url(#igGrad)" />

  <!-- camera outline -->
  <path d="M7.5 7.5h9a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1h-9a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1z" fill="none" stroke="#fff" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- lens -->
  <circle cx="12" cy="12" r="2.8" fill="none" stroke="#fff" stroke-width="1.3"/>

  <!-- small flash / viewfinder -->
  <circle cx="17" cy="7" r="0.9" fill="#fff"/>
</svg>